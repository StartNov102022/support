<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HappyEveryday Support</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; line-height: 1.6; padding: 40px 20px; max-width: 600px; margin: 0 auto; text-align: center; color: #333; }
        h1 { color: #007aff; margin-bottom: 10px; }
        p { font-size: 1.1em; color: #666; }

        .email-text { font-weight: bold; color: #007aff; font-size: 1.2em; display: block; margin: 15px 0; }
        .btn { display: inline-block; background: #007aff; color: white; padding: 12px 25px; border-radius: 10px; text-decoration: none; font-weight: bold; transition: background 0.3s; }
        .btn:hover { background: #0056b3; }
        footer { margin-top: 50px; font-size: 0.9em; color: #999; }

    <h1>HappyEveryday Support</h1>

    <div class="contact-box">
        <h3>聯絡我們 (Contact Us)</h3>
        <p>請發送電子郵件至以下信箱：</p>
        <span class="email-text">MCUinvincible@gmail.com</span>
        <a href="mailto:MCUinvincible@gmail.com" class="btn">立即發送郵件</a>

    <footer>
